  <!-- Preload LCP poster image -->

  <!-- Preload + Preconnect para CDN -->

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'float': 'float 3s ease-in-out infinite',
          },
          keyframes: {
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          },
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            popover: {
              DEFAULT: "hsl(var(--popover))",
              foreground: "hsl(var(--popover-foreground))",
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
          },
          borderRadius: {
            lg: "var(--radius)",
            md: "calc(var(--radius) - 2px)",
            sm: "calc(var(--radius) - 4px)",
          },
        },
      },
    }
  </script>
  <style>
    @layer base {
      :root {
        /* Light Mode - High Contrast Revision */
        --background: 0 0% 95%;
        /* Light Gray #f2f2f2 */
        --foreground: 240 10% 3.9%;
        /* Dark Text */
        --card: 0 0% 100%;
        /* White */
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 0 100% 45%;
        /* Slightly Darker Vivid Red for text contrast */
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 5% 92%;
        /* Slightly darker muted for better input bg definition */
        --muted-foreground: 240 3.8% 40%;
        /* Darker grey for better readability */
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 82%;
        /* Darker borders for white cards */
        --input: 240 5.9% 82%;
        --ring: 0 100% 50%;
        --radius: 0.5rem;
      }

      .dark {
        --background: 0 0% 0%;
        /* Black Background */
        --foreground: 0 0% 98%;
        /* White Text */
        --card: 0 0% 5%;
        /* Dark grey for cards */
        --card-foreground: 0 0% 98%;
        --popover: 0 0% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 85% 38%;
        /* Dark Red for WCAG AA contrast (4.66:1 with white) */
        --primary-foreground: 0 0% 98%;
        --secondary: 0 0% 14.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 0 0% 14.9%;
        --muted-foreground: 0 0% 63.9%;
        --accent: 0 0% 14.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 0 0% 14.9%;
        --input: 0 0% 14.9%;
        --ring: 0 100% 50%;
      }
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Smooth Scrolling and Theme Transition */
    html {
      scroll-behavior: smooth;
    }

    body,
    .bg-background,
    .bg-card,
    .text-foreground,
    .border-border {
      transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
      transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      transition-duration: 300ms;
    }

    /* Custom Scrollbar - Modern & Subtle */
    /* Webkit browsers (Chrome, Safari, Edge) */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(var(--muted-foreground) / 0.3);
      border-radius: 4px;
      transition: background 0.2s ease;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: hsl(var(--muted-foreground) / 0.5);
    }

    .dark ::-webkit-scrollbar-thumb {
      background: hsl(var(--muted-foreground) / 0.2);
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: hsl(var(--muted-foreground) / 0.4);
    }

    /* Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: hsl(var(--muted-foreground) / 0.3) transparent;
    }

    .dark * {
      scrollbar-color: hsl(var(--muted-foreground) / 0.2) transparent;
    }
  </style>
</head>

<body
